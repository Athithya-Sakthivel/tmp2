apiVersion: v1
kind: ConfigMap
metadata:
  name: app-postgres-pgbouncer-config
  namespace: databases
data:
  pgbouncer.ini: |
    [databases]
    flyteadmin = host=app-postgres-rw.databases.svc.cluster.local port=5432 dbname=flyteadmin
    flytepropeller = host=app-postgres-rw.databases.svc.cluster.local port=5432 dbname=flytepropeller
    mlflow = host=app-postgres-rw.databases.svc.cluster.local port=5432 dbname=mlflow
    risingwave = host=app-postgres-rw.databases.svc.cluster.local port=5432 dbname=risingwave
    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 5432
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    server_reset_query = DISCARD ALL
  userlist.txt: |
    "flyteadmin_user" "md52218aef0280a76ca59139d5508375baf"
    "flytepropeller_user" "md58a087f7f6fcc633a8f230b920819299c"
    "mlflow_user" "md553297503cbc8b31ee15251452bdb1a52"
    "risingwave_user" "md51ddf59537353f1e9717fd2223b403af9"
